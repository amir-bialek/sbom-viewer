name: Build and Push Docker Images

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Image type'
        required: true
        default: 'backend'
        type: choice
        options:
          - backend
          - frontend
  pull_request:
    types: [opened, synchronize, reopened]

env:
  REPO: bialekamir/sbom-viewer

permissions:
  contents: write

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    env:
      TYPE: ${{ github.event.inputs.type }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        run: |
          LATEST_TAG=$(git tag -l "${TYPE}-v[0-9]*.[0-9]*.[0-9]*" | sort -V | tail -n 1)
          echo "Latest tag found: $LATEST_TAG"
          if [ -z "$LATEST_TAG" ]; then
              NEW_TAG="${TYPE}-v1.0.0"
          else
              NEW_TAG=$(echo "$LATEST_TAG" | awk -F. 'BEGIN{OFS="."}{$NF+=1;print}')
          fi
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
          echo "Generated new tag: $NEW_TAG"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push dockerfile
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.TYPE }}
          file: ${{ env.TYPE }}/Dockerfile
          push: true
          tags: ${{ env.REPO }}:${{ env.NEW_TAG }},${{ env.REPO }}:${{ env.TYPE }}-latest

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Auto Tag"

      - name: Push Tag
        run: |
          git tag ${{ env.NEW_TAG }}
          git push origin ${{ env.NEW_TAG }}

  docker-build-pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    strategy:
      matrix:
        type: [backend, frontend]
    env:
      TYPE: ${{ matrix.type }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build dockerfile
        uses: docker/build-push-action@v6
        with:
          context: ${{ env.TYPE }}
          file: ${{ env.TYPE }}/Dockerfile
          push: false
          tags: ${{ env.REPO }}:${{ env.TYPE }}
