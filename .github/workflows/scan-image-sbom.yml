name: Scan Docker Image SBOM

on:
  workflow_dispatch:
    inputs:
      image:
        description: 'Full Docker Hub image reference (e.g. ubuntu:24.04)'
        required: true
        type: string
      enrich:
        description: 'Enrich the SBOM with Trivy vulnerabilities and Annex B metadata.'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-22.04
    steps:
      - name: Set image reference
        id: image
        run: |
          ref="${{ inputs.image }}"
          repo="${ref%%:*}"
          tag="${ref##*:}"
          echo "ref=$ref" >> "$GITHUB_OUTPUT"
          echo "repo=$repo" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Pull image
        run: docker pull ${{ steps.image.outputs.ref }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0.24.0
        env:
          SYFT_CHECK_FOR_APP_UPDATE: "false"
        with:
          image: ${{ steps.image.outputs.ref }}
          format: cyclonedx-json
          output-file: syft.cdx.json
          upload-artifact: false
          syft-args: --scope squashed

      - name: Enrich SBOM
        if: inputs.enrich
        uses: amir-bialek/sbom-viewer/actions/enrich-sbom@enrich-sbom-v1.0.1
        with:
          syft-sbom-path: syft.cdx.json
          output-path: sbom.enriched.cdx.json
          enable-trivy: ${{ inputs.enrich }}
          enable-annex-b: ${{ inputs.enrich }}

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ steps.image.outputs.tag }}
          path: ${{ inputs.enrich && 'sbom.enriched.cdx.json' || 'syft.cdx.json' }}
          retention-days: 90
